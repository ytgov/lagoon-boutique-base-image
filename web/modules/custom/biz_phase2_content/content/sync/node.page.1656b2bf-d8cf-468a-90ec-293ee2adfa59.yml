    value: "<p><span><span><span>There are 4 steps to register as a lobbyist. You must complete all of these steps to be registered.</span></span></span></p>\r\n\r\n<ol>\r\n\t<li><span><span><span> Create your account.</span></span></span></li>\r\n\t<li><span><span><span> We’ll send a verification email to the address you’ve provided. Follow the instructions in this email.</span></span></span></li>\r\n\t<li><span><span><span> Add your first lobbying activity.</span></span></span></li>\r\n\t<li><span><span><span> Once the admin approves your account and first lobbying activity – you are registered.</span></span></span></li>\r\n</ol>\r\n\r\n<h2><span><span><span><span><span>Before you register</span></span></span></span></span></h2>\r\n\r\n<ul>\r\n\t<li><span><span><span><a href=\"/determine-if-you-are-lobbyist\">Determine if you or your organization qualify as a lobbyist</a>.</span></span></span></li>\r\n\t<li><span><span><span>Make sure you've reached the <a href=\"/reporting-requirements-periods\">threshold number of hours that requires you register</a>.</span></span></span></li>\r\n</ul>\r\n\r\n<h2>&nbsp;</h2>\r\n\r\n<div class=\"btn btn-primary btn-purple\"><a href=\"/in-house-registration\"><span><span><span>Register as an in-house lobbyist</span></span></span></a></div>\r\n\r\n<div class=\"btn btn-primary btn-purple\"><a href=\"/consultant-registration\"><span><span><span>Register as a consultant lobbyist</span></span></span></a></div>\r\n"
