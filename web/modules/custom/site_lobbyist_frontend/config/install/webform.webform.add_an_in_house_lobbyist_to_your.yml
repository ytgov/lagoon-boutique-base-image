id: add_an_in_house_lobbyist_to_your
title: 'Add an in-house lobbyist to your organization edit'
description: "In-House lobbyist lobby on behalf of an organization as an emproyee, CEO, partner, exective director, board member, etc.&nbsp;<br />\r\n<br />\r\nClick here for definition of in-house lobbyist."
category: ''
elements: |-
  update_organization_action:
    '#type': processed_text
    '#wrapper_attributes':
      class:
        - organization-form
    '#text': |
      <div class="organization info-organization two-columns-orange-header">
      <div class="col-xs-6 no-padding">
      <p><strong>Organization</strong></p>
      </div>

      <div class="col-xs-6 no-padding update-action"><a class="update-action" href="update-user">Edit organization</a></div>
      </div>
    '#format': full_html
  organization_header:
    '#type': processed_text
    '#format': full_html
  processed_text:
    '#type': processed_text
    '#text': |
      <p>An in-house lobbyist, lobbies the government on behalf of an organization. For example, as an employee, CEO, partner, executive director, board member, etc.</p>

      <p><a href="https://yukonlobbyistregistry.ca/en/types-lobbyists">Find out more about in-house lobbyists</a></p>

      <p>&nbsp;</p>

      <p>&nbsp;</p>
    '#format': basic_html
  processed_text_01:
    '#type': processed_text
    '#text': |
      <p>In-house lobbyist information</p>
    '#format': basic_html
  first_name:
    '#type': textfield
    '#title': 'First name'
    '#required': true
  last_name:
    '#type': textfield
    '#title': 'Last name'
    '#required': true
  position:
    '#type': textfield
    '#title': Position
    '#required': true
  contact_information:
    '#type': processed_text
    '#text': |
      <p>Contact information</p>
    '#format': basic_html
  e_mail_address:
    '#type': webform_email_confirm
    '#title': Email
    '#description_display': after
    '#format': value
    '#confirm__title': 'Conform email address'
    '#confirm__description': 'A confirmation message will be sent to this email address once account is created.'
  telephone:
    '#type': textfield
    '#title': Telephone
    '#input_mask': '(999) 999-9999'
    '#format_items': comma
    '#international_preferred_countries': {  }
    '#telephone_validation_format': '0'
    '#telephone_validation_countries':
      - CA
  status:
    '#type': select
    '#title': Status
    '#options':
      active: Active
      blocked: Blocked
    '#default_value': active
    '#wrapper_attributes':
      class:
        - no-display
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': Finish
    '#submit__attributes':
      class:
        - purple-button
    '#preview_prev__label': 'Edit details'
    '#preview_next__label': 'Continue to next step'
    '#update__attributes':
      class:
        - purple-button
