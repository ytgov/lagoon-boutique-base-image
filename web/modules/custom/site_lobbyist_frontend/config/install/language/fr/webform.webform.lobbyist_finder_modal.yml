elements: "page_0:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': 'J’AI COMPRIS'\nmarkup_62:\n  '#markup': Avertissement\ndisclaimer_body:\n  '#markup': '<p>Ce questionnaire est proposé à titre informatif seulement. Le type de lobbyiste que vous êtes est déterminé à partir des critères énoncés dans la <em>Loi sur l’inscription des lobbyistes du Yukon</em>.</p>'\npage_1:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup:\n  '#markup': '<p>Nous devons déterminer si vous communiquez avec un titulaire de charge publique.</p>'\npage_2:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_01:\n  '#markup': '<p>Communiquez-vous avec un titulaire de charge publique?</p>'\nmarkup_02:\n  '#markup': \"<p>Ce peut être :</p>\\n\\n<ul>\\n <li>Un député de l’Assemblée législative</li>\\n <li>Employé du caucus</li>\\n <li>Le premier ministre, un ministre, un employé du Conseil des ministres ou un employé d’un groupe parlementaire</li>\\n <li>Sous-ministre d'un ministère ou d'une direction</li>\\n <li>Président d'une société d'État</li>\\n <li>Un fonctionnaire du gouvernement du Yukon</li>\\n <li>Employé de la société d'État du Yukon</li>\\n</ul>\\n<br />\\n&nbsp;\\n\"\nmarkup_2302:\n  '#markup': 'Vous ne semblez pas être un lobbyiste.'\nprocessed_text_0602:\n  '#text': \"<p>Selon les réponses que vous avez fournies, vous ne semblez pas être un lobbyiste au sens de la <em>Loi sur l’inscription des lobbyistes</em>.</p>\\n\"\nprocessed_text_0702:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil du registre des lobbyistes</a>\\n\"\npage_3:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_03:\n  '#markup': '<p>Nous devons déterminer comment vous communiquez avec un titulaire de charge publique.</p>'\npage_4:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_04:\n  '#markup': 'Communiquez-vous ou comptez-vous communiquer avec un titulaire de charge publique?'\nmarkup_05:\n  '#markup': \"<p>Exemples de techniques de communication (liste non exhaustive) :</p>      \\n\\n<ul>\\n <li>Médias sociaux</li>\\n <li>Appels téléphoniques ou messages textes</li>\\n <li>Réunions informelles et officielles</li>\\n <li>Organisation d’un rendez-vous avec un titulaire de charge publique pour le compte d’un client</li>\\n <li>Appels au grand public (ex. chercher à persuader le public de signer des pétitions)</li>\\n</ul>\\n\"\nmarkup_23:\n  '#markup': 'Vous ne semblez pas être un lobbyiste.'\nprocessed_text_06:\n  '#text': \"<p>Selon les réponses que vous avez fournies, vous ne semblez pas être un lobbyiste au sens de la <em>Loi sur l’inscription des lobbyistes</em>.</p>\\n\"\nprocessed_text_07:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil du registre des lobbyistes</a>\\n  \\n\"\npage_5:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_06:\n  '#markup': '<p>Nous devons déterminer si le résultat attendu de vos communications est de tenter d’influencer.</p>'\npage_6:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_07:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_08:\n  '#markup': '<p>l’élaboration de propositions législatives?</p>'\npage_6_1:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_24:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_25:\n  '#markup': '<p>le dépôt d’un projet de loi, d’une motion ou d’une résolution devant l’Assemblée législative OU sa modification, son adoption ou son rejet par celle-ci?</p>'\npage_6_2:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_28:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_29:\n  '#markup': '<p>la prise ou la modification d’un règlement (ex. <em>Règlement sur les refuges fauniques</em>)?</p>'\npage_6_3:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_31:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_32:\n  '#markup': '<p>l’élaboration, la modification ou la cessation d’une politique ou d’un programme du gouvernement (ex. création d’un nouveau programme pour les jeunes)?</p>'\npage_6_4:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_34:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_35:\n  '#markup': '<p>une décision du Conseil des ministres, d’un comité du Conseil des ministres ou d’un ministre de charger le secteur privé, plutôt que le gouvernement, de la fourniture de biens ou de services au gouvernement?</p>'\npage_6_5:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_37:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_38:\n  '#markup': '<p>l’attribution d’une subvention, d’une contribution ou de tout autre avantage financier par le gouvernement ou en son nom?</p>'\npage_6_6:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_09:\n  '#markup': '<p>Le résultat attendu de vos communications est-il de tenter d’influencer&hellip;</p>'\nmarkup_10:\n  '#markup': \"<p>l’attribution d’un contrat par le gouvernement ou en son nom? (ex.\\_attribution d’un contrat pour la construction d’une nouvelle installation publique)?</p>\"\nmarkup_44_not:\n  '#markup': 'Vous ne semblez pas être un lobbyiste.'\nprocessed_text_28_lobby:\n  '#text': \"<p>Selon les réponses que vous avez fournies, vous ne semblez pas être un lobbyiste au sens de la <em>Loi sur l’inscription des lobbyistes</em>. If you are unsure, check the legislation or email <a href=\\\"mailto:yla@gov.yk.ca\\\">info@yukonlobbyistregistry.ca</a> to confirm.</p>\\n\"\nprocessed_text_29_link:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil du registre des lobbyistes</a>\\n\"\npage_8:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_13:\n  '#markup': \"<p>Nous devons déterminer quel type de lobbyiste vous êtes.&nbsp;<br />\\nLes questions qui suivent nous permettront de déterminer si vous êtes un lobbyiste salarié ou un lobbyiste-conseil.&nbsp;</p>\\n\"\npage_9:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_14:\n  '#markup': 'Quel est votre rôle?'\nmarkup_15:\n  '#markup': \"<p>Faites-vous ou ferez-vous du lobbyisme pour le compte d’un client (ex.\\_vous avez conclu un contrat avec un client pour faire du lobbyisme en son nom)?</p>\"\npage_10:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_16:\n  '#markup': 'Quel est votre rôle?'\nmarkup_17:\n  '#markup': 'Travaillez-vous pour un autre particulier, une personne morale ou une organisation (ex. vous travaillez pour une société et vos fonctions consistent à faire du lobbyisme pour elle)?'\npage_11:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_18:\n  '#markup': 'Quel est votre rôle?'\nmarkup_19:\n  '#markup': 'Êtes-vous un travailleur autonome ou membre d’une société de personnes?'\npage_12:\n  '#prev_button_label': PRÉCÉDENT\n  '#next_button_label': SUIVANT\nmarkup_20:\n  '#markup': 'Quel est votre rôle?'\nmarkup_21:\n  '#markup': \"Êtes-vous «\\_l’âme dirigeante\\_» d’une personne morale, d’une société de personnes ou d’une organisation, qui contrôle une partie ou la totalité de ses activités (ex. vous êtes membre du conseil d’administration d’une société et faites du lobbyisme pour elle)?<br />\\n<br />\\n&nbsp;\\n\"\nmarkup_44:\n  '#markup': 'Vous ne semblez pas être un lobbyiste.'\nprocessed_text_28:\n  '#text': \"<p>Selon les réponses que vous avez fournies, vous ne semblez pas être un lobbyiste au sens de la <em>Loi sur l’inscription des lobbyistes</em>. If you are unsure, check the legislation or email <a href=\\\"mailto:yla@gov.yk.ca\\\">info@yukonlobbyistregistry.ca</a> to confirm.</p>\\n\"\nprocessed_text_29:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil du registre des lobbyistes</a>\\n  \\n\"\nfinal_page:\n  '#prev_button_label': PRÉCÉDENT\nmarkup_inhouse:\n  '#markup': \"Vous semblez être un lobbyiste salarié.<br />\\n<br />\\n&nbsp;\\n\"\nprocessed_inhouse_1:\n  '#text': \"<a href=\\\"/fr/in-house-registration\\\">Inscription</a>\\n\"\nprocessed_inhouse_2:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil</a>\\n\"\nmarkup_consultant:\n  '#markup': \"Vous semblez être un lobbyiste-conseil.<br />\\n<br />\\n&nbsp;\\n\"\nprocessed_consultant_1:\n  '#text': \"<a href=\\\"/fr/consultant-registration\\\">Inscription</a>\\n\"\nprocessed_consultant_2:\n  '#text': \"<a href=\\\"/fr\\\">Retour à la page d’accueil</a>\\n\"\n"
