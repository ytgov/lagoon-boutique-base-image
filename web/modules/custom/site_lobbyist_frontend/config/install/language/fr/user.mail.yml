cancel_confirm:
  body: "[user:display-name],\r\n\r\nUne demande de suppression de votre compte sur [site:name] a été faite.\r\n\r\nVous pouvez maintenant supprimer votre compte sur [site:url-brief] en cliquant sur le lien ci-dessous ou en le copiant dans votre navigateur : \r\n\r\n[user:cancel-url]\r\n\r\nA NOTER : La suppression de votre compte est définitive.\r\n\r\nCe lien expirera dans un jour et aucune action ne sera lancée s'il n'est pas utilisé.\r\n\r\n--  L'équipe de [site:name]"
  subject: 'Demande d''annulation du compte [user:display-name] sur [site:name]'
password_reset:
  body: "[user:display-name],\r\n\r\nUne demande de réinitialisation de mot de passe a été faite pour votre compte sur l’interface des lobbyistes.\r\n\r\nVous pouvez à présent vous connecter en cliquant sur le lien suivant ou en le copiant et en le collant dans votre navigateur\_: \r\n\r\n[user:one-time-login-url]\r\n\r\nCe lien ne peut être utilisé qu’une fois pour vous connecter.\r\nIl vous dirigera vers une page sur laquelle vous pourrez réinitialiser votre mot de passe. \r\nIl expire au bout d’une journée et rien ne se produira s’il n’est pas utilisé.\r\n\r\n\r\n--  L'équipe de [site:name]"
  subject: 'Modification des informations de connexion pour [user:display-name] sur [site:name]'
register_admin_created:
  body: "<p>Ce courriel constitue une confirmation de votre demande de créer un compte de lobbyiste salarié dans le registre des lobbyistes du Yukon. ([site:url])</p>\r\n\r\n<p>Ce qu’il faut faire</p>\r\n\r\n<p>À titre de lobbyiste salarié, vous devez faire rapport de vos activités de lobbyisme et ajouter tous les employés, membres du conseil d’administration et autres qui pourraient faire du lobbyisme pour votre organisation.</p>\r\n<ul>\r\n       <li>1. Connectez-vous au registre([site:url]/login).</li>\r\n       <li>2. Entrez l’adresse courriel et le mot de passe que vous avez créé en vous inscrivant.</li>\r\n        <li>3. Sur la page d’accueil, ajoutez une activité de lobbyisme en cliquant sur « ajout d’une activité de lobbyisme ».</li>\r\n<ul>\r\n\r\n<p>Besoin d’assistance</p>\r\n\r\n<p>Si vous avez besoin d’aide pour vérifier votre inscription, écrivez à info@yukonlobbyistregistry.ca ou téléphonez au 867-667-5618.</p>"
  subject: 'Confirmation: Create an in-house lobbyist account FR'
register_no_approval_required:
  body: "<p>This email is confirmation of your application to create an in-house lobbyist account on the Yukon Lobbyist Registry.</p>\r\n\r\n<p>What you need to do </p>\r\n\r\n<p>As an in-house lobbyist you are required to report your lobbying activity and add any employees in your organization who are performing lobbyist\r\nactivities.</p>\r\n<ul>\r\n       <li>  Log into the registry([site:url]/login).</li>\r\n<ul>\r\n                <li>  Email address</li>\r\n\r\n               <li>   Your password</li>\r\n</ul>\r\n</ul>\r\n<p>If you need help</p>\r\n\r\n<p>If assistance is required email info@yukonlobbyistregistry.ca or telephone</p>\r\n\r\n<p>867-667-5618</p>"
  subject: 'Confirmation: Create an in-house lobbyist account FR'
register_pending_approval:
  body: "<p>Le présent courriel constitue une confirmation de votre demande de créer un compte de lobbyiste-conseil dans le registre des lobbyistes du Yukon.([site:url])</p>\r\n\r\n<p> Ce qu’il faut faire</p>\r\n\r\n<p>À titre de lobbyiste-conseil, vous devez faire rapport de vos activités de lobbyisme, en indiquant pour le compte de qui vous les menez.</p>\r\n<ul>\r\n          <li>1. Connectez-vous au registre  ([site:url]/login).\r\n          <li>2.Entrez l’adresse courriel et le mot de passe que vous avez créé en vous inscrivant.</li>\r\n          <li>3. Sur la page d’accueil, ajoutez une activité de lobbyisme en cliquant sur « ajout d’une activité de lobbyisme ».</li>\r\n<ul>\r\n\r\n<p> Besoin d’assistance</p>\r\n\r\n<p>Si vous avez besoin d’aide pour vérifier votre inscription, écrivez à info@yukonlobbyistregistry.ca ou téléphonez au 867-667-5618.</p>"
  subject: 'Confirmation: Create an in-house lobbyist account FR'
