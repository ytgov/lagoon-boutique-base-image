id: add_a_lobbying_activity
title: 'Add lobbying activity'
description: 'The Senior Officer is responsible for adding/modifying lobbying activities for an organizarion. Oranizations must register if they lobby for a total of 20 hours or more in a calendar year.&nbsp;'
category: ''
elements: |-
  sutitle_general:
    '#type': processed_text
    '#text': |
      <p>The Senior Officer is responsible for adding/modifying lobbying activities for an organizarion. Oranizations must register if they lobby for a total of 20 hours or more in a calendar year.&nbsp;</p>
    '#format': basic_html
  title:
    '#type': textfield
    '#title': Title
    '#description': 'This is an internal title, you should use a short description of the contract.'
    '#description_display': after
    '#help_display': element_after
    '#required': true
  which_topic_do_you_want_to_lobby_government_about_:
    '#type': webform_term_select
    '#title': 'Which topic do you want to lobby the government about?'
    '#multiple': true
    '#select2': true
    '#required': true
    '#format': label
    '#vocabulary': lobby_s_topics
    '#breadcrumb_delimiter': ''
  other:
    '#type': textfield
    '#title': Other
  add_detail:
    '#type': textarea
    '#title': 'Add details about your lobbying activity (optional)'
  who_are_you_lobbying_or_plan_to_lobby_:
    '#type': webform_term_select
    '#title': 'Who are you lobbying or plan to lobby?'
    '#multiple': true
    '#select2': true
    '#required': true
    '#format': label
    '#vocabulary': lobbyist_s_portfolios
    '#breadcrumb_delimiter': ''
    '#tree_delimiter': ''
  how_do_you_want_to_lobby_:
    '#type': webform_checkboxes_other
    '#title': 'How do you want to lobby?'
    '#description': 'For information on the types of lobbying, <a href="http://&lt;front&gt;">click here</a>'
    '#description_display': after
    '#options':
      'By letter and email': 'By letter and email'
      'By phone call': 'By phone call'
      'In-person conversation': 'In-person conversation'
      'By petition': 'By petition'
      'Social media campaign': 'Social media campaign'
    '#options_display': two_columns
    '#other__option_label': Other
    '#required': true
  has_your_organization_received_a_grant_from_the_government_of_yu:
    '#type': radios
    '#title': 'Has your organization received a grant from the government of Yukon within the last year?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
    '#options_display': side_by_side
    '#required': true
  was_the_grant_awarded_related_to_the_matter_the_lobbying_has_bee:
    '#type': radios
    '#title': 'Was the grant awarded related to the matter the lobbying has been or will be undertaken '
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      'I don’t know': 'I don’t know'
    '#options_display': side_by_side
    '#required': true
  status:
    '#type': select
    '#title': Status
    '#options':
      Active: Active
      Pending: Pending
      Non-compliant: Non-compliant
      'About to be Not in compliance': 'About to be Not in compliance'
    '#default_value': Pending
    '#wrapper_attributes':
      class:
        - no-display
  user_uid:
    '#type': hidden
    '#title': user_uid
  frontend_status:
    '#type': select
    '#title': 'Frontend status'
    '#options':
      Active: Active
      Inactive: Inactive
      Non-compliant: Non-compliant
    '#wrapper_attributes':
      class:
        - no-display
  certify:
    '#type': hidden
    '#title': certify
    '#default_value': '0'
  year:
    '#type': select
    '#title': Year
    '#options':
      2019: '2019'
      2020: '2020'
      2021: '2021'
      2022: '2022'
    '#select2': true
  version_number:
    '#type': hidden
    '#title': 'Version number'
    '#default_value': '1'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': FINISH
    '#submit__attributes':
      class:
        - 'purple-button hidden'
    '#preview_prev__label': 'EDIT DETAILS'
    '#preview_next__label': 'CONTINUE TO NEXT STEP'
    '#update__attributes':
      class:
        - 'purple-button hidden'
  group_buttonss:
    '#type': container
    legislation_button:
      '#type': webform_markup
      '#markup': '<div class="purple-button"><a href="">Legislation</a></div>'
    faqs_button:
      '#type': webform_markup
      '#markup': '<div class="purple-button"><a href="">Faqs</a></div>'
    back_home_button:
      '#type': webform_markup
      '#markup': '<div class="purple-button"><a href="/">Back to home</a></div>'
