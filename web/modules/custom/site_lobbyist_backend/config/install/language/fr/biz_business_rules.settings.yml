consultant_end_contract:
  value: "<p>Ce message a pour but de vous informer que vous devez produire votre déclaration marquant la fin de votre contrat de lobbyisme dans les 30 jours.</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Connectez-vous au <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\">registre des lobbyistes du Yukon</a> pour produire la déclaration finale de votre contrat de lobbyisme. Passez en revue vos activités de lobbyisme, actualisez-les au besoin et attestez que les renseignements sont exacts.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p>Vous êtes en tout temps responsable de veiller à ce que vos déclarations soient remplies et produites dans les délais prescrits par la Loi.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em>.</a></p>\r\n"
  format: basic_html
consultant_end_contract_plus_15:
