in_house_subject_first_activity: 'Première activité de lobbyisme'
in_house_first_activity:
  value: "<p>Vous avez déclaré votre première activité de lobbyisme.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Prochaine étape</strong></p>\r\n\r\n<p>L’administrateur passera en revue l’activité. Une fois acceptée par l’administrateur, l’activité sera publiée dans le registre.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em>.</a></p>\r\n"
  format: basic_html
