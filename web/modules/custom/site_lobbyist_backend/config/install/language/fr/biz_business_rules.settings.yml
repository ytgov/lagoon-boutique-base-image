commissioner_subject_approve_first_act: 'Acceptation de l’activité de lobbyisme'
commissioner_approve_first_act:
  value: "<p>L’administrateur a accepté votre première activité de lobbyisme qui est maintenant publiée dans le registre.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Prochaine étape</strong></p>\r\n\r\n<p>L’administrateur n’examine que la première activité de lobbyisme. Toutes les modifications et les autres activités seront publiées automatiquement dans le registre.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n\r\n<p>&nbsp;</p>\r\n"
  format: basic_html
