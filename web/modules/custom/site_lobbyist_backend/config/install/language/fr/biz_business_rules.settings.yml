in_house_subject_end_31_dec: 'Fin de la période de déclaration des activités de lobbyisme'
in_house_end_31_dec:
  value: "<p>Ce message a pour but de vous informer que vous devez produire votre déclaration de fin d'année civile avant le 31&nbsp;janvier.</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Pour produire votre déclaration de fin d’année civile, connectez-vous au <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\">registre des lobbyistes du Yukon</a>. Passez en revue vos activités de lobbyisme, actualisez-les au besoin et attestez que les renseignements sont exacts.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p>Vous êtes en tout temps responsable de veiller à ce que vos déclarations soient remplies et produites dans les délais prescrits par la Loi.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_end_15_jan: 'Déclaration provisoire des activités de lobbyisme'
in_house_subject_end_31_jan: 'Fin de la période de déclaration des activités de lobbyisme – omission de déclaration'
in_house_end_31_jan:
  value: "<p>Ce message a pour but de vous informer que vous deviez produire votre déclaration de fin d'année civile avant le 31&nbsp;janvier. Vous n’avez pas produit votre déclaration. Votre organisation est donc jugée non conforme et vos activités de lobbyisme sont dorénavant verrouillées pour l’édition.</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Contactez l’administrateur à l’adresse <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a> pour qu’il remette votre compte en règle.&nbsp;</p>\r\n\r\n<p>Vous êtes en tout temps responsable de veiller à ce que vos déclarations soient remplies et produites dans les délais prescrits par la Loi.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_update_before_end_calendar: 'Fin de la période de déclaration des activités de lobbyisme'
in_house_update_before_end_calendar:
  value: "<p>Nous accusons réception de votre déclaration de fin d’année civile et vous en remercions.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour obtenir des renseignements généraux ou accéder à votre compte, connectezvous au <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\">registre des lobbyistes du Yukon</a>.</p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em>.</a></p>\r\n"
  format: basic_html
consultant_subject_prior_6_months: 'Déclaration provisoire des activités de lobbyisme'
consultant_prior_6_months:
  value: "<p>Vous devez actualiser vos activités de lobbyisme tous les six mois dans le cadre de votre contrat de lobbyisme. Vous disposez de 30 jours à compter d’aujourd’hui pour le faire.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Pour produire votre déclaration semestrielle, connectez-vous au<a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\"> registre des lobbyistes du Yukon</a>. Passez en revue vos activités de lobbyisme, actualisez-les au besoin et attestez que les renseignements sont exacts.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_prior_6_months_plus_15: 'Déclaration provisoire des activités de lobbyisme'
consultant_prior_6_months_plus_15:
  value: "<p>Vous devez actualiser vos activités de lobbyisme tous les six mois dans le cadre de votre contrat de lobbyisme. Vous disposez de 15 jours à compter d’aujourd’hui pour le faire.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Pour produire votre déclaration semestrielle, connectez-vous au <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\">registre des lobbyistes du Yukon</a>. Passez en revue vos activités de lobbyisme, actualisez-les au besoin et attestez que les renseignements sont exacts.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour obtenir de l’aide</strong></p>\r\n\r\n<p>Contactez l’administrateur à l’adresse <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a>.</p>\r\n\r\n<p>&nbsp;</p>\r\n"
  format: basic_html
consultant_subject_prior_6_months_plus_30: 'Déclaration provisoire des activités de lobbyisme – omission de déclaration'
consultant_prior_6_months_plus_30:
  value: "<p>Votre organisation n’a pas produit de déclaration semestrielle.&nbsp;Votre déclaration semestrielle accuse maintenant un retard.&nbsp;</p>\r\n\r\n<p>Vous devez actualiser vos activités de lobbyisme tous les six mois dans le cadre de votre contrat de lobbyisme.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Ce qu’il faut faire</strong></p>\r\n\r\n<p>Pour produire votre déclaration semestrielle, connectez-vous au<a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr/s-identifier\"> registre des lobbyistes du Yukon</a>. Passez en revue vos activités de lobbyisme, actualisezles au besoin et attestez que les renseignements sont exacts.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Pour en savoir plus</strong></p>\r\n\r\n<p>Pour en savoir plus sur les exigences de déclaration des activités de lobbyisme, consultez la <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/fr\"><em>Loi sur l’inscription des lobbyistes</em></a>.</p>\r\n"
  format: basic_html
