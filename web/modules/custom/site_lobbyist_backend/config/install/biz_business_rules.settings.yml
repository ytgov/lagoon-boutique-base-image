commissioner_subject_approve_first_act: 'Lobbying activity accepted'
commissioner_approve_first_act:
  value: "<p>The administrator accepted your first lobbying activity and it is now available on the registry.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What’s next:</strong></p>\r\n\r\n<p>The administrator only reviews the first lobbying activity. Any edits or additional activities will be automatically published on the registry.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
commissioner_updated_act:
