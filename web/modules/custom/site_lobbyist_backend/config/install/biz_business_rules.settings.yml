in_house_subject_add_new_lobbyist: 'You''ve been added to the Yukon Lobbyist Registry'
in_house_add_new_lobbyist:
  value: "<p>You have been added as an in-house lobbyist by {{organization}}. This information has been published on the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\">Yukon Lobbyist Registry</a>.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see&nbsp;the&nbsp;<a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em>.</a></p>\r\n"
  format: basic_html
in_house_subject_add_new_activity: 'New lobbying activity'
in_house_add_new_activity:
  value: "<p>You submitted a new lobbying activity. It has been published on the&nbsp;<a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\">Yukon Lobbyist Registry.</a>&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_end_31_dec: ' End of reporting period for lobbying'
in_house_end_31_dec:
  value: "<p>This message is to notify you that your return for the end of the calendar year is due on January 31.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>To file your year-end return, log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\">Yukon Lobbyist Registry.</a> Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_end_15_jan: 'Interim reporting on lobbying'
in_house_end_15_jan:
  value: "<p>This message is to notify you that your return for the end of the calendar year was due on January 31. You have 15 days from today to do so.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>Contact the administrator at <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a> to bring your account into compliance.&nbsp;</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_end_31_jan: 'End of reporting period for lobbying – failure to report'
in_house_end_31_jan:
  value: "<p>This message is to notify you that your return for the end of the calendar year was due on January 31. You have not submitted your return. Your organization has been identified as non-compliant and your lobbying activities are now locked from editing.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>Contact the administrator at <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a> to bring your account into compliance.&nbsp;</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_update_before_end_calendar: 'End of reporting period for lobbying'
in_house_update_before_end_calendar:
  value: "<p>Your return for the end of the calendar year has been received. Thank you.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For general information or to log into your registry account, visit the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\">Yukon Lobbyist Registry.</a></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
in_house_subject_first_activity: 'First lobbying activity'
in_house_first_activity:
  value: "<p>You submitted your first lobbying activity.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What’s next:</strong></p>\r\n\r\n<p>The administrator will review the activity. Once the administrator accepts the activity, it will be published on the registry.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_prior_6_months: 'Interim reporting on lobbying'
consultant_prior_6_months:
  value: "<p>You are required to provide updates on your lobbying every 6 months within your lobbying contract. You have 30 days from today to do so.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>To file your semi-annual return, log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry.</a> Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_prior_6_months_plus_15: 'Interim reporting on lobbying'
consultant_prior_6_months_plus_15:
  value: "<p>You are required to provide updates on your lobbying every 6 months within your lobbying contract. You have 15 days from today to do so.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>To file your semi-annual return, log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry.</a> Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>If you need assistance:</strong></p>\r\n\r\n<p>Contact the administrator at <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a></p>\r\n"
  format: basic_html
consultant_subject_prior_6_months_plus_30: 'Interim reporting on lobbying – failure to report'
consultant_prior_6_months_plus_30:
  value: "<p>Your organization has not submitted your semi-annual return.&nbsp;Your semi-annual return is now overdue.&nbsp;</p>\r\n\r\n<p>You are required to provide updates on your lobbying every 6&nbsp;months within your lobbying contract.&nbsp;</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>To file your semi-annual return, log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry</a>. Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_end_contract: 'End of reporting period for lobbying'
consultant_end_contract:
  value: "<p>This message is to notify you that your return for the end of your lobbying contract is due in 30 days.</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>Log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry</a> to file your final return for your lobbying contract. Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_end_contract_plus_15: 'End of reporting period for lobbying'
consultant_end_contract_plus_15:
  value: "<p>This message is to notify you that your return for the end of your lobbying contract is due in 15 days.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>Log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry</a> to file your final return for your lobbying contract. Review your lobbying activities, provide updates as necessary and certify the information is correct.</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
consultant_subject_end_contract_plus_30: 'End of reporting period for lobbying – failure to report'
consultant_end_contract_plus_30:
  value: "<p>This message is to notify you that your final return for the end of your lobbying contract is overdue.</p>\r\n\r\n<p>You have been identified as non-compliant. Your lobbying activities are now locked from editing.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>Contact the administrator at <a href=\"mailto:info@yukonlobbyistregistry.ca\">info@yukonlobbyistregistry.ca</a> to bring your account into compliance.</p>\r\n\r\n<p>It is and remains your responsibility to ensure that filings are completed and submitted within the timelines required by the Act.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
