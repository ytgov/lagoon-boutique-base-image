admin_subject_new_comment: 'New comment - Yukon Lobbyist Registry'
admin_new_comment:
  value: "<p>The administrator sent you a message.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p>Log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry</a> and open your lobbying activity to view the comment and reply.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
lobbyist_subject_new_comment: 'New comment from a lobbyist'
lobbyist_new_comment:
  value: "<p>{{organization}}&nbsp;sent you a message. Log into the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login\">Yukon Lobbyist Registry</a> to view the comment and reply.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>For more information about your requirements to report lobbying activities, see the <a href=\"http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca\"><em>Lobbyists Registration Act</em></a>.</p>\r\n"
  format: basic_html
lobbyist_updated_act:
