id: add_new_in_house_lobbyist
title: 'Add an in-house lobbyist to your organization'
description: "In-House lobbyist lobby on behalf of an organization as an employee, CEO, partner, executive director, board member, etc.&nbsp;<br />\n<br />\nClick here for definition of in-house lobbyist.\n"
category: ''
elements: "update_organization_action:\n  '#type': processed_text\n  '#format': full_html\norganization_header:\n  '#type': processed_text\n  '#format': full_html\ngeneral_container:\n  '#type': fieldset\n  '#title': 'general container'\n  '#title_display': invisible\n  '#description_display': invisible\n  processed_text:\n    '#type': processed_text\n    '#text': |\n      <p>An in-house lobbyist, lobbies the government on behalf of an organization. For example, as an employee, CEO, partner, executive director, board member, etc.</p>\n      \n      <p><a href=\"/\">See the full definition of an in-house lobbyist</a></p>\n      \n    '#format': basic_html\n  processed_text_01:\n    '#type': processed_text\n    '#text': |\n      <p>In-house lobbyist information</p>\n      \n    '#format': basic_html\n  first_name:\n    '#type': textfield\n    '#title': 'First name'\n    '#required': true\n  last_name:\n    '#type': textfield\n    '#title': 'Last name'\n    '#required': true\n  position:\n    '#type': textfield\n    '#title': Position\n    '#required': true\n  contact_information:\n    '#type': processed_text\n    '#text': |\n      <p>Contact information</p>\n      \n    '#format': basic_html\n  e_mail_address:\n    '#type': webform_email_confirm\n    '#title': Email\n    '#description_display': after\n    '#format': value\n    '#confirm__title': 'Confirm email address'\n    '#confirm__description': 'A confirmation message will be sent to this email address once account is created.'\n  telephone:\n    '#type': textfield\n    '#title': Telephone\n    '#input_mask': 999-999-9999\n    '#format_items': comma\n    '#international_preferred_countries': {  }\n    '#telephone_validation_format': '0'\n    '#telephone_validation_countries':\n      - CA\n  deleted:\n    '#type': select\n    '#title': Deleted\n    '#options':\n      'false': 'false'\n      'true': 'true'\n    '#empty_option': 'false'\n    '#empty_value': 'false'\n    '#default_value': 'false'\nactions:\n  '#type': webform_actions\n  '#title': 'Submit button(s)'\n  '#submit__label': Finish\n  '#submit__attributes':\n    class:\n      - purple-button\n  '#preview_prev__label': 'Edit details'\n  '#preview_next__label': 'Continue to next step'\n  '#update__attributes':\n    class:\n      - purple-button\nuser_uid:\n  '#type': hidden\n  '#title': user_uid"
