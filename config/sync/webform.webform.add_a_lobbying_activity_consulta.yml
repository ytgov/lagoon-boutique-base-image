id: add_a_lobbying_activity_consulta
title: 'Add a lobbying activity consultant'
description: ''
categories: {  }
elements: |-
  markup_0:
    '#type': webform_markup
    '#markup': 'Who are you lobbying on behalf of?'
  org_name:
    '#type': textfield
    '#title': 'Org. Name'
    '#format_items': comma
  custom_address:
    '#type': address
    '#title': Address
    '#default_value':
      country_code: CA
      langcode: ''
      address_line1: ''
      locality: ''
      administrative_area: ''
      postal_code: ''
      given_name: null
      additional_name: null
      family_name: null
      organization: null
      address_line2: null
      sorting_code: null
      dependent_locality: null
    '#format_items': ol
    '#field_overrides':
      givenName: hidden
      additionalName: hidden
      familyName: hidden
      organization: hidden
      addressLine1: required
      addressLine2: hidden
      postalCode: required
      sortingCode: hidden
      dependentLocality: hidden
      locality: required
      administrativeArea: required
  e_mail_address:
    '#type': textfield
    '#title': 'E-mail address'
    '#format_items': comma
  custom_telephone:
    '#type': textfield
    '#title': Telephone
    '#input_mask': 999-999-9999
    '#format_items': comma
  markup_1:
    '#type': webform_markup
    '#markup': 'Start and end date of the lobbying contract'
  container_dates:
    '#type': container
    start_date:
      '#type': date
      '#title': 'Start date'
      '#format_items': comma
      '#datepicker': true
    end_date:
      '#type': date
      '#title': 'End date'
      '#format_items': comma
      '#datepicker': true
  title:
    '#type': textfield
    '#title': Title
    '#description': 'This is an internal title, you should use a short description of the contract.'
  which_topic_do_you_want_to_lobby_government_about_:
    '#type': webform_term_select
    '#title': 'Which topic do you want to lobby the government about?'
    '#multiple': true
    '#select2': true
    '#format': label
    '#vocabulary': lobby_s_topics
    '#breadcrumb_delimiter': ''
  other:
    '#type': textfield
    '#title': Other
  add_detail:
    '#type': textarea
    '#title': 'Add details about your lobbying activity (optional)'
  who_are_you_lobbying_or_plan_to_lobby_:
    '#type': webform_term_select
    '#title': 'Who are you lobbying or plan to lobby?'
    '#multiple': true
    '#select2': true
    '#format': text
    '#vocabulary': lobbyist_s_portfolios
    '#breadcrumb_delimiter': ''
    '#tree_delimiter': ''
  how_do_you_want_to_lobby_:
    '#type': webform_checkboxes_other
    '#title': 'How do you want to lobby?'
    '#description': 'For information on the types of lobbying, click here'
    '#options':
      'By letter and email': 'By letter and email'
      'By phone call': 'By phone call'
      'In-person conversation': 'In-person conversation'
      'By petition': 'By petition'
      'Social media campaign': 'Social media campaign'
    '#options_display': two_columns
    '#other__option_label': Other
  has_your_organization_received_a_grant_from_the_government_of_yu:
    '#type': radios
    '#title': 'Has your organization received a grant from the government of Yukon within the last year?'
    '#options':
      'Yes': 'Yes'
      'No': 'No'
  was_the_grant_awarded_related_to_the_matter_the_lobbying_has_bee:
    '#type': radios
    '#title': 'Was the grant awarded related to the matter the lobbying has been or will be undertaken '
    '#options':
      'Yes': 'Yes'
      'No': 'No'
      'I don’t know': 'I don’t know'
  status:
    '#type': select
    '#title': Status
    '#options':
      Active: Active
      Pending: Pending
      Non-compliant: Non-compliant
      Inactive: Inactive
      'About to be Not in compliance': 'About to be Not in compliance'
    '#default_value': Pending
    '#wrapper_attributes':
      class:
        - no-display
  frontend_status:
    '#type': select
    '#title': 'Frontend status'
    '#options':
      Active: Active
      Inactive: Inactive
      Non-compliant: Non-compliant
  certify:
    '#type': hidden
    '#title': certify
    '#default_value': '0'
  version_number:
    '#type': hidden
    '#title': 'Version number'
    '#default_value': '1'
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': FINISH
    '#submit__attributes':
      class:
        - purple-button
        - hidden
    '#update__attributes':
      class:
        - purple-button
        - hidden
    '#preview_prev__label': 'EDIT DETAILS'
    '#preview_next__label': 'CONTINUE TO NEXT STEP'
  user_uid:
    '#type': hidden
    '#title': user_uid
