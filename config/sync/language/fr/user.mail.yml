cancel_confirm:
  subject: "Demande d'annulation du compte [user:display-name] sur [site:name]"
  body: "[user:display-name]\r\n\r\nA request to cancel your account has been made at [site:name].\r\n\r\nYou may now cancel your account on [site:url-brief] by clicking this link or copying and pasting it into your browser:\r\n\r\n[user:cancel-url]\r\n\r\nNOTE: The cancellation of your account is not reversible.\r\n\r\nThis link expires in one day and nothing will happen if it is not used.\r\n\r\n--  [site:name] team"
password_reset:
  subject: 'Modification des informations de connexion pour [user:display-name] sur [site:name]'
  body: "[user:display-name],\r\n\r\nUne demande de réinitialisation de votre mot de passe pour votre compte a été faite sur [site:name].\r\n\r\nVous pouvez maintenant vous connecter en cliquant sur le lien ci-dessous ou en le copiant dans votre navigateur : \r\n\r\n[user:one-time-login-url]\r\n\r\nCe lien ne peut être utilisé qu'une seule fois pour vous connecter et vous mènera à la page pour changer votre mot de passe. Il expirera dans un jour et rien ne se passera s'il n'est pas utilisé.\r\n\r\n--  L'équipe de [site:name]"
register_admin_created:
  subject: 'Registre des lobbyistes du Yukon – Compte de lobbyiste salarié créé'
  body: "[user:display-name],\r\n\r\nA site administrator at [site:name] has created an account for you. You may now log in by clicking this link or copying and pasting it into your browser:\r\n\r\n[user:one-time-login-url]\r\n\r\nThis link can only be used once to log in and will lead you to a page where you can set your password.\r\n\r\nAfter setting your password, you will be able to log in at [site:login-url] in the future using:\r\n\r\nusername: [user:name]\r\npassword: Your password\r\n\r\n--  [site:name] team"
register_no_approval_required:
  subject: 'Détails du compte [user:display-name] sur [site:name]'
  body: "[user:display-name],\r\n\r\nNous vous remercions pour votre inscription sur [site:name]. Vous pouvez maintenant vous connecter en utilisant le lien ci-dessous ou en le copiant dans votre navigateur : \r\n\r\n[user:one-time-login-url]\r\n\r\nCe lien ne peut être utilisé qu'une seule fois et vous redirigera vers une page où vous pourrez choisir votre mot de passe.\r\n\r\nAprès avoir choisi votre mot de passe, vous pourrez vous connecter sur [site:login-url] en utilisant : \r\n\r\nNom d'utilisateur : [user:name]\r\nmot de passe : Votre mot de passe\r\n\r\n--  L'équipe de [site:name]"
register_pending_approval:
  subject: "Détails du compte [user:display-name] sur [site:name] (en attente de validation d'un administrateur)"
  body: "[user:display-name],\r\n\r\nNous vous remercions pour votre demande d'inscription sur [site:name]. Votre demande est actuellement en cours de validation. Une fois la validation faite, vous recevrez un autre courriel de confirmation contenant les informations vous permettant de vous connecter, choisir votre mot de passe ainsi que d'autres détails.\r\n\r\n\r\n--  L'équipe de [site:name]"
register_pending_approval_admin:
  subject: "Détails du compte [user:display-name] sur [site:name] (en attente de validation d'un administrateur)"
  body: "[user:display-name] a fait une demande de compte.\r\n\r\n[user:edit-url]"
status_activated:
  subject: 'Registre des lobbyistes du Yukon – Création d’un compte de lobbyiste-conseil'
  body: "<p>Vous avez créé un compte dans le registre des lobbyistes du Yukon. Pour terminer l’inscription, suivez les instructions ci-dessous. Vous trouverez aussi les instructions à la page <a href=\"https://yukonlobbyistregistry.ca/fr/s%E2%80%99inscrire-en-tant-que-lobbyiste\"> S’inscrire en tant que lobbyiste  </a>.</p>\r\n\r\n<p><strong>Marche à suivre : </strong></p>\r\n<ol>\r\n<li>Connectez-vous au registre des lobbyistes à l’aide de l’adresse courriel et du mot de passe que vous avez utilisés pour créer votre compte.</li>\r\n<li>Ajoutez votre première activité de lobbyisme.</li>\r\n<li>La personne responsable examinera les renseignements que vous avez transmis. Votre inscription sera achevée une fois que votre première activité de lobbyisme aura été approuvée</li>\r\n</ol>\r\n\r\n<p><strong>Besoin d’aide?</strong></p>\r\n\r\n<p>Consultez la page sur la <a href=\"https://yukonlobbyistregistry.ca/fr/gestion-de-votre-compte\">Gestion de votre compte</a>  ​dans le registre des lobbyistes.</p>\r\n\r\n<p>Si vous avez des questions au sujet du registre des lobbyistes du Yukon, écrivez à info@yukonlobbyistregistry.ca ou composez le 867-667-5618.</p"
status_blocked:
  subject: 'Détails du compte [user:display-name] sur [site:name] (bloqué)'
  body: "[user:display-name],\r\n\r\nVotre compte sur [site:name] a été bloqué.\r\n\r\n-- L'équipe [site:name]"
status_canceled:
  subject: 'Détails du compte [user:display-name] sur [site:name] (annulé)'
  body: "[user:display-name],\r\n\r\nVotre compte sur [site:name] a été annulé.\r\n\r\n--  L'équipe de [site:name]"
