langcode: en
cancel_confirm:
  subject: 'Account cancellation request for [user:display-name] at [site:name]'
  body: "[user:display-name]\r\n\r\nA request to cancel your account has been made at [site:name].\r\n\r\nYou may now cancel your account on [site:url-brief] by clicking this link or copying and pasting it into your browser:\r\n\r\n[user:cancel-url]\r\n\r\nNOTE: The cancellation of your account is not reversible.\r\n\r\nThis link expires in one day and nothing will happen if it is not used.\r\n\r\n--  [site:name] team"
password_reset:
  subject: 'Password reset for Yukon Lobbyist Registry'
  body: "<p>[user:display-name],</p>\r\n\r\n<p>We’ve received your request to reset your password to the Yukon Lobbyist Registry.</p>\r\n\r\n<p><strong>What you need to do:</strong></p>\r\n\r\n<p>This password reset will expire in 24 hours. If it expires, you can go to the Lobbyist Registry (link) to reset your password again.</p>\r\n<ol>\r\n<li>Select this link or copy and paste it into your browser. You can only use this link once.  \r\n[user:one-time-login-url]</li>\r\n\r\n<li>Reset your password in the lobbyist registry. </li>\r\n</ol>\r\n<p><strong>For more information:</strong></p>\r\n\r\n<p>Email the Office of the Lobbyist Registry at info@yukonlobbyistregistry.ca.</p>"
register_admin_created:
  subject: 'Yukon Lobbyist Registry: In-house lobbyist account created'
  body: "<p>You have created your Yukon Lobbyist Registry account. Complete the registration process by following the instructions in this email. You can also find these instructions on the <a href=\"https://yukonlobbyistregistry.ca/en/register-as-lobbyist\">Register as a lobbyist page</a>.</p>\r\n<p><strong>What you need to do to:</strong></p>\r\n<ol>\r\n<li>Log in to the Lobbyist Registry with the email address and password you used to create your account.</li>\r\n<li>Add your first lobbying activity.</li>\r\n<li>The Lobbyist Administrator will review your information. Once they approve your first lobbying activity – you are registered.</li>\r\n</ol>\r\n<p><strong>If you need help:</strong></p>\r\n<p>Refer to the <a href=\"https://yukonlobbyistregistry.ca/en/how-to-manage-your-account\">How to manage your account</a> page on the Lobbyist Registry.</p>\r\n<p>For questions about the registration process email info@yukonlobbyistregistry.ca or phone 867-667-5618.</p>\r\n"
register_no_approval_required:
  subject: 'Confirmation: Create an in-house lobbyist account'
  body: "This email is confirmation of your application to create an in-house lobbyist account on the Yukon Lobbyist Registry.\r\nWhat you need to do \r\nAs an in-house lobbyist you are required to report your lobbying activity and add any employees in your organization who are performing lobbyist\r\nactivities.\r\n    1. Log into the registry([site:url]/login).\r\n        a. Email address\r\n        b. Your password\r\nIf you need help\r\nIf assistance is required email info@yukonlobbyistregistry.ca or telephone\r\n867-667-5618"
register_pending_approval:
  subject: 'Yukon Lobbyist Registry: In-house lobbyist account create'
  body: "This email is confirmation of your application to create a consultant lobbyist account on the Yukon Lobbyist Registry ([site:url])\r\nWhat you need to do:\r\nAs a consultant lobbyist, you are required to report your lobbying activity on behalf of a client.\r\n\r\n    1.  Log into the registry ([site:url]/login).\r\n    2.  Enter the email address and password you created when you registered.\r\n    3.  From your account page, add a lobbying activity by clicking on \"add a lobbying activity.\"\r\n\r\nIf you need help:\r\nFor help verifying your registration, email info@yukonlobbyistregistry.ca or phone 867-667-5618."
register_pending_approval_admin:
  subject: 'Yukon Lobbyist Registry: In-house lobbyist account created'
  body: "You have created your Yukon Lobbyist Registry account. Complete the registration process by following the instructions in this email. You can also find these instructions on the Register as a lobbyist page\r\n\r\nWhat you need to do to\r\n\r\n1. Log in to the Lobbyist Registry with the email address and password you used to create your account.\r\n2. Add your first lobbying activity.\r\n3. The Lobbyist Administrator admin will review your information. Once they approve your first lobbying activity – you are registered.\r\n\r\n<p><strong>If you need help:</strong></p>\r\nRefer to the <a>“How to manage your account”</a> page on the Lobbyist Registry (https://yukonlobbyistregistry.ca/en/how-to-manage-your-account).\r\nFor questions about the registration process email info@yukonlobbyistregistry.ca or phone 867-667-5618.\r\n"
status_activated:
  subject: 'Yukon Lobbyist Registry: Consultant lobbyist account created'
  body: "<p>You have created your Yukon Lobbyist Registry account. Complete the registration process by following the instructions in this email. You can also find these instructions on the <a href=\"https://yukonlobbyistregistry.ca/en/register-as-lobbyist\">Register as a lobbyist page</a>.</p>\r\n<p><strong>What you need to do to:</strong></p>\r\n<ol>\r\n<li>Log in to the Lobbyist Registry with the email address and password you used to create your account.</li>\r\n<li>Add your first lobbying activity.</li>\r\n<li>The Lobbyist Administrator will review your information. Once they approve your first lobbying activity – you are registered.</li>\r\n</ol>\r\n<p><strong>If you need help:</strong></p>\r\n<p>Refer to the <a href=\"https://yukonlobbyistregistry.ca/en/how-to-manage-your-account\">How to manage your account</a> page on the Lobbyist Registry.</p>\r\n<p>For questions about the registration process email info@yukonlobbyistregistry.ca or phone 867-667-5618.</p>\r\n"
status_blocked:
  subject: 'Account details for [user:display-name] at [site:name] (blocked)'
  body: "[user:display-name],\r\n\r\nYour account on [site:name] has been blocked.\r\n\r\n--  [site:name] team"
status_canceled:
  subject: 'Account details for [user:display-name] at [site:name] (canceled)'
  body: "[user:display-name],\r\n\r\nYour account on [site:name] has been canceled.\r\n\r\n--  [site:name] team"
