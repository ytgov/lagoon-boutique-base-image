  format: basic_html
lobbyist_subject_new_comment: 'New comment from a lobbyist'
lobbyist_new_comment:
  value: '<p>{{organization}}&nbsp;sent you a message. Log into the <a href="http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login">Yukon Lobbyist Registry</a> to view the comment and reply.</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>For more information:</strong></p><p>For more information about your requirements to report lobbying activities, see the <a href="https://legislation.yukon.ca/acts/lobreg_c.pdf"><em>Lobbyists Registration Act</em></a>.</p>'
  format: basic_html
lobbyist_updated_act:
  value: '<p>{{organization}}&nbsp;updated an activity. Log into the <a href="http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login">Yukon Lobbyist Registry</a> to view the activity.</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>For more information:</strong></p><p>For more information about your requirements to report lobbying activities, see the <a href="https://legislation.yukon.ca/acts/lobreg_c.pdf"><em>Lobbyists Registration Act</em></a>.</p>'
  format: basic_html
admin_subject_new_comment: 'New comment - Yukon Lobbyist Registry'
admin_new_comment:
  value: '<p>The administrator sent you a message.</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>What you need to do:</strong></p><p>Log into the <a href="http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login">Yukon Lobbyist Registry</a> to view the comment and reply as necessary.</p><p>&nbsp;</p><p><strong>For more information:</strong></p><p>For more information about your requirements to report lobbying activities, see the <a href="https://legislation.yukon.ca/acts/lobreg_c.pdf"><em>Lobbyists Registration Act</em></a>.</p>'
  format: basic_html
commissioner_subject_approve_first_act: 'Yukon Lobbyist Registry: You are registered'
commissioner_approve_first_act:
  value: '<p>The Yukon Lobbyist Administrator has approved your first reported lobbying activity. This means your registration is complete. We only review and approve your first lobbying activity to verify your account</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>What’s next:</strong></p><p>You can now log in to your account and manage your information.</p><p>Refer to our <a href="http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/en/how-to-manage-your-account">How to manage your lobbyist account</a>&nbsp;page for guidance on adding in-house lobbyists and adding more lobbying activities.</p><p><strong>For more information:</strong></p><p>Email <a href="mailto:info@yukonlobbyistregistry.ca">info@yukonlobbyistregistry.ca</a> for questions about the Yukon Lobbyist Registry.</p>'
  format: basic_html
commissioner_updated_act:
  value: '<p>Administrator updated an activity. &nbsp;<strong>If the Administrator commented on your registration, you can&nbsp;</strong>log into the&nbsp;<a href="http://bizont-lobbyist.cms-dev.ynet.gov.yk.ca/login">Yukon Lobbyist Registry</a>&nbsp;to view the comment and reply.</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>For more information:</strong></p><p>For more information about your requirements to report lobbying activities, see the <a href="https://legislation.yukon.ca/acts/lobreg_c.pdf"><em>Lobbyists Registration Act</em></a>.</p>'
  format: basic_html
you_updated_act:
  value: '<p>The activity was updated.</p><p><a href="{{link}}">Click here</a> to login and verify.</p><p><strong>For more information:</strong></p><p>For more information about your requirements to report lobbying activities, see the <a href="https://legislation.yukon.ca/acts/lobreg_c.pdf"><em>Lobbyists Registration Act</em></a>.</p>'
  format: basic_html
